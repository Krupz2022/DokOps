# backend/app/static/dokops-agent.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: dokops
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dokops
  namespace: dokops
---
apiVersion: v1
kind: Secret
metadata:
  name: dokops-token
  namespace: dokops
  annotations:
    kubernetes.io/service-account.name: dokops
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dokops-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - namespaces
      - nodes
      - events
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dokops-readonly-binding
subjects:
  - kind: ServiceAccount
    name: dokops
    namespace: dokops
roleRef:
  kind: ClusterRole
  name: dokops-readonly
  apiGroup: rbac.authorization.k8s.io
