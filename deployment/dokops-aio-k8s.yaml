apiVersion: apps/v1
kind: Deployment
metadata:
  name: dokops-aio
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dokops-aio
  template:
    metadata:
      labels:
        app: dokops-aio
    spec:
      containers:
        - name: dokops-aio
          image: krupz/dokops-aio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          env:
            - name: SECRET_KEY
              value: "changeme-super-secret-key-1234"
            - name: DOKOPS_ADMIN_USERNAME
              value: "admin"
            - name: DOKOPS_ADMIN_PASSWORD
              value: "admin123"
            - name: SQLITE_URL
              value: "sqlite:////data/sql_app.db"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dokops-aio
  namespace: default
spec:
  type: NodePort
  selector:
    app: dokops-aio
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
