{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dokops-aio.serviceAccountName" . }}
  labels:
    {{- include "dokops-aio.labels" . | nindent 4 }}
{{- end }}
---
{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dokops-aio.fullname" . }}-cluster-role
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dokops-aio.fullname" . }}-binding
subjects:
- kind: ServiceAccount
  name: {{ include "dokops-aio.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "dokops-aio.fullname" . }}-cluster-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
