# Default values for dokops-aio.

image:
  repository: krupz/dokops-aio
  pullPolicy: Always
  tag: "latest"

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: "dokops-aio-sa"

# God Mode RBAC (ClusterRole)
rbac:
  create: true

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  apiPort: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: dokops.local
      paths:
        - path: /
          pathType: Prefix

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  # storageClass: "-"

# Secret management
# If existingSecret is set, we use that. Otherwise we expect it to be created manually or we could create it (not safe for git)
auth:
  existingSecret: "dokops-aio-secrets"
  secretKey: "auth-secret"

env:
  pythonUnbuffered: "1"
  k8sInClusterConfig: "true"
