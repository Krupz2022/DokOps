{{- $backendOwnSecret := not .Values.backend.secrets.existingSecret }}
{{- $postgresOwnSecret := and .Values.postgres.enabled (not .Values.postgres.secrets.existingSecret) }}
{{- $hasSSOSecrets := or .Values.sso.entra.clientSecret (or .Values.sso.google.clientSecret (or .Values.sso.google.serviceAccountJson (or .Values.sso.authentik.clientSecret .Values.sso.cognito.clientSecret))) }}
{{- if or $backendOwnSecret $postgresOwnSecret $hasSSOSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dokops.fullname" . }}-secret
  namespace: {{ include "dokops.namespace" . }}
  labels:
    {{- include "dokops.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Core ────────────────────────────────────────────────────────
  {{- if $backendOwnSecret }}
  auth-secret-key: {{ required "backend.secrets.authSecretKey must be set (or provide backend.secrets.existingSecret)" .Values.backend.secrets.authSecretKey | quote }}
  {{- end }}
  {{- if $postgresOwnSecret }}
  postgres-password: {{ required "postgres.secrets.password must be set (or provide postgres.secrets.existingSecret)" .Values.postgres.secrets.password | quote }}
  {{- end }}
  # ── SSO client secrets ──────────────────────────────────────────
  {{- if .Values.sso.entra.clientSecret }}
  entra-client-secret: {{ .Values.sso.entra.clientSecret | quote }}
  {{- end }}
  {{- if .Values.sso.google.clientSecret }}
  google-client-secret: {{ .Values.sso.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.sso.google.serviceAccountJson }}
  google-service-account-json: {{ .Values.sso.google.serviceAccountJson | quote }}
  {{- end }}
  {{- if .Values.sso.authentik.clientSecret }}
  authentik-client-secret: {{ .Values.sso.authentik.clientSecret | quote }}
  {{- end }}
  {{- if .Values.sso.cognito.clientSecret }}
  cognito-client-secret: {{ .Values.sso.cognito.clientSecret | quote }}
  {{- end }}
{{- end }}
