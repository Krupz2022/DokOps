<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Orbit icon (matches Lucide Orbit): outer ellipse ring + center dot + orbital path -->
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="white"/>
  <!-- Main orbit ring -->
  <ellipse cx="16" cy="16" rx="8.5" ry="8.5" fill="none" stroke="white" stroke-width="1.6" opacity="0.9"/>
  <!-- Tilted orbital ellipse -->
  <ellipse cx="16" cy="16" rx="8.5" ry="3.5" fill="none" stroke="white" stroke-width="1.6" opacity="0.75" transform="rotate(-30 16 16)"/>
</svg>
